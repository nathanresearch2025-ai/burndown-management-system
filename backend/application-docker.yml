spring:
  datasource:
    url: jdbc:postgresql://burndown-postgres:5432/burndown_db
    username: postgres
    password: root
  data:
    redis:
      host: localhost
      port: 6379

ai:
  enabled: ${AI_ENABLED:false}
  base-url: ${AI_BASE_URL:}
  api-key: ${AI_API_KEY:}
  chat-model: ${AI_CHAT_MODEL:}
  timeout: ${AI_TIMEOUT:30s}
  max-similar-tasks: ${AI_MAX_SIMILAR_TASKS:5}
  rate-limit:
    max-requests-per-user: ${AI_RATE_LIMIT_MAX_REQUESTS:10}
    window-minutes: ${AI_RATE_LIMIT_WINDOW_MINUTES:60}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: burndown-management
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.9,0.95,0.99
  prometheus:
    metrics:
      export:
        enabled: true
