global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: burndown-backend
    metrics_path: /api/v1/actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080
        labels:
          application: burndown-management
          environment: local
