spring:
  application:
    name: burndown-management

  datasource:
    url: jdbc:postgresql://localhost:5432/burndown_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
        query:
          in_clause_parameter_padding: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  ai:
    openai:
      base-url: https://api.deepseek.com/v1
      api-key: sk-0bc064c6fb5d4fd48300705c47d4b11e
      chat:
        options:
          model: deepseek-chat
          temperature: 0.2

server:
  port: 8080
  servlet:
    context-path: /api/v1

jwt:
  secret: your-secret-key-change-this-in-production-min-256-bits
  expiration: 604800000

ai:
  enabled: true
  base-url: https://api.deepseek.com/v1
  api-key: sk-0bc064c6fb5d4fd48300705c47d4b11e
  chat-model: deepseek-chat
  embedding-model: text-embedding-3-small
  embedding-base-url: https://api.openai.com/v1
  embedding-api-key: ${OPENAI_API_KEY:}
  timeout: 30s
  max-similar-tasks: 5
  rate-limit:
    max-requests-per-user: 50
    window-minutes: 10

agent:
  standup:
    enabled: true
    max-tool-rounds: 3
    response-timeout: 30s
    require-evidence: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.9,0.95,0.99
  prometheus:
    metrics:
      export:
        enabled: true
