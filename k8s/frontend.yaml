apiVersion: apps/v1
kind: Deployment
metadata:
  name: burndown-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: burndown-frontend
  template:
    metadata:
      labels:
        app: burndown-frontend
    spec:
      hostNetwork: true
      containers:
      - name: burndown-frontend
        image: burndown-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: burndown-frontend
spec:
  selector:
    app: burndown-frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30173
  type: NodePort
