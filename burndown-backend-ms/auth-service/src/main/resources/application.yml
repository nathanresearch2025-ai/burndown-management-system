server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:159.75.202.106}:${DB_PORT:5432}/${DB_NAME:burndown_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        default_schema: pg_auth
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:159.75.202.106}
      port: ${REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:159.75.202.106:8848}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.burndown.auth: DEBUG
