server:
  port: 8084

spring:
  application:
    name: burndown-service
  datasource:
    url: jdbc:postgresql://159.75.202.106:5432/burndown_db?currentSchema=pg_burndown
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        default_schema: pg_burndown
        format_sql: true
  data:
    redis:
      host: 159.75.202.106
      port: 6379
      timeout: 2000ms
  rabbitmq:
    host: 159.75.202.106
    port: 5672
    username: guest
    password: guest
    virtual-host: /
  cloud:
    nacos:
      discovery:
        server-addr: 159.75.202.106:8848
        namespace: ""

resilience4j:
  circuitbreaker:
    instances:
      taskService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
      projectService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.burndown.burndown: DEBUG
