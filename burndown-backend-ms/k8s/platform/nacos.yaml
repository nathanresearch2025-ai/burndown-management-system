apiVersion: v1
kind: ConfigMap
metadata:
  name: nacos-config
data:
  MODE: "standalone"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nacos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nacos
  template:
    metadata:
      labels:
        app: nacos
    spec:
      hostNetwork: true
      containers:
      - name: nacos
        image: nacos/nacos-server:v2.3.0
        ports:
        - containerPort: 8848
        - containerPort: 9848
        - containerPort: 9849
        env:
        - name: MODE
          value: "standalone"
        - name: PREFER_HOST_MODE
          value: "hostname"
        - name: SPRING_DATASOURCE_PLATFORM
          value: "embedded"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: nacos
spec:
  type: NodePort
  ports:
  - port: 8848
    targetPort: 8848
    nodePort: 30848
    name: http
  - port: 9848
    targetPort: 9848
    nodePort: 30948
    name: client-rpc
  - port: 9849
    targetPort: 9849
    nodePort: 30949
    name: raft-rpc
  selector:
    app: nacos
