server:
  port: 8085

spring:
  application:
    name: ai-agent-service
  datasource:
    url: jdbc:postgresql://159.75.202.106:30432/burndown_db?currentSchema=pg_ai
    username: postgres
    password: root
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        default_schema: pg_ai
        format_sql: true
  data:
    redis:
      host: 159.75.202.106
      port: 30379
      timeout: 2000ms
  cloud:
    nacos:
      discovery:
        server-addr: 159.75.202.106:30848
        namespace: ""
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}

ai:
  enabled: false
  base-url: ""
  api-key: ""
  chat-model: ""
  timeout-seconds: 30
  max-similar-tasks: 5
  max-tokens: 2048

resilience4j:
  circuitbreaker:
    instances:
      taskService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.burndown.ai: DEBUG
