spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        file-extension: yml
        namespace: ${NACOS_NAMESPACE:public}
        group: DEFAULT_GROUP
        extension-configs:
          - data-id: auth-service.yml
            group: DEFAULT_GROUP
            refresh: true
