---
# Prometheus ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'k8s-cluster'
        environment: 'production'

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    rule_files:
      - '/etc/prometheus/alert_rules.yml'

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'burndown-backend'
        metrics_path: '/api/v1/actuator/prometheus'
        scrape_interval: 15s
        scrape_timeout: 10s
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - default
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: burndown-backend
          - source_labels: [__meta_kubernetes_pod_ip]
            action: replace
            target_label: __address__
            replacement: $1:8080
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: instance
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod

  alert_rules.yml: |
    groups:
      - name: backend_alerts
        interval: 30s
        rules:
          - alert: HighCPUUsage
            expr: process_cpu_usage{job="burndown-backend"} > 0.8
            for: 5m
            labels:
              severity: high
              component: backend
            annotations:
              summary: "后端服务 CPU 使用率过高"
              description: "实例 {{ $labels.instance }} CPU 使用率为 {{ $value | humanizePercentage }}，持续超过 5 分钟"

          - alert: HighMemoryUsage
            expr: (jvm_memory_used_bytes{area="heap",job="burndown-backend"} / jvm_memory_max_bytes{area="heap",job="burndown-backend"}) > 0.85
            for: 5m
            labels:
              severity: high
              component: backend
            annotations:
              summary: "后端服务内存使用率过高"
              description: "实例 {{ $labels.instance }} 堆内存使用率为 {{ $value | humanizePercentage }}，持续超过 5 分钟"

          - alert: HighErrorRate
            expr: (sum(rate(http_server_requests_seconds_count{status=~"5..",job="burndown-backend"}[3m])) by (instance) / sum(rate(http_server_requests_seconds_count{job="burndown-backend"}[3m])) by (instance)) > 0.05
            for: 3m
            labels:
              severity: high
              component: backend
            annotations:
              summary: "后端服务错误率过高"
              description: "实例 {{ $labels.instance }} 5xx 错误率为 {{ $value | humanizePercentage }}，持续超过 3 分钟"

          - alert: ServiceDown
            expr: up{job="burndown-backend"} == 0
            for: 1m
            labels:
              severity: critical
              component: backend
            annotations:
              summary: "后端服务不可用"
              description: "实例 {{ $labels.instance }} 无法访问，持续超过 1 分钟"

---
# Prometheus Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
      - name: prometheus
        image: prom/prometheus:v2.48.0
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus'
          - '--storage.tsdb.retention.time=15d'
          - '--web.console.libraries=/usr/share/prometheus/console_libraries'
          - '--web.console.templates=/usr/share/prometheus/consoles'
        ports:
        - containerPort: 9090
          name: web
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: storage
          mountPath: /prometheus
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: storage
        emptyDir: {}

---
# Prometheus Service
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: default
spec:
  type: NodePort
  ports:
  - port: 9090
    targetPort: 9090
    nodePort: 30090
    protocol: TCP
    name: web
  selector:
    app: prometheus

---
# Prometheus ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: default

---
# Prometheus ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
- apiGroups: [""]
  resources:
  - nodes
  - nodes/proxy
  - services
  - endpoints
  - pods
  verbs: ["get", "list", "watch"]
- apiGroups:
  - extensions
  resources:
  - ingresses
  verbs: ["get", "list", "watch"]

---
# Prometheus ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: default
